<!DOCTYPE html>
<html>
<head>
<title>Request Ride</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

input{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:20px;
font-size:16px;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#009688;
color:white;
border:none;
border-radius:8px;
}
</style>

</head>

<body>

<h2>🚖 Request a Ride</h2>

<label>Pickup Location</label>
<input id="pickup" placeholder="Enter pickup">

<label>Destination</label>
<input id="destination" placeholder="Enter destination">

<button onclick="bookRide()">
Request Ride
</button>

<script>
function bookRide(){

let pickup=document.getElementById("pickup").value;
let destination=document.getElementById("destination").value;

if(pickup=="" || destination==""){
alert("Please fill in all fields");
return;
}

alert(
"Ride Requested!\n\nPickup: "+pickup+
"\nDestination: "+destination+
"\n\nSearching for nearby drivers..."
);

}
</script>

</body>
</html>
